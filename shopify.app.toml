# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "581d27169be5b359b888cda24fec4cf7"
name = "RTO-Predictor"
application_url = "https://shopify-test-plugin-hitech.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true 

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_analytics,read_assigned_fulfillment_orders,read_custom_fulfillment_services,read_customers,read_delivery_customizations,read_delivery_option_generators,read_files,read_fulfillment_constraint_rules,read_fulfillments,read_inventory,read_inventory_shipments,read_inventory_shipments_received_items,read_online_store_pages,read_orders,read_product_listings,read_products,read_shipping,write_assigned_fulfillment_orders,write_custom_fulfillment_services,write_delivery_customizations,write_delivery_option_generators,write_files,write_fulfillment_constraint_rules,write_fulfillments,write_inventory,write_inventory_shipments,write_inventory_shipments_received_items,write_online_store_pages,write_orders,write_product_listings,write_products,write_shipping"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://shopify-test-plugin-hitech.up.railway.app/auth/callback" ]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
